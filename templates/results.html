<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Round Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CG.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('CGGAME') }}">Play</a>
        <a href="{{ url_for('overview') }}">Overview</a>
        <a href="{{ url_for('add_location') }}">Add Location</a>
        <a class="{% if request.endpoint == 'home' %}active{% endif %}" href="{{ url_for('home') }}">Home</a>
    </div>
    <h1 class="mainTitle">Round Results</h1>
    <div class="flex-container">
        <div class="zoom-container">
            <img id="TotallyRealImage" class="image" src="{{ url_for('static', filename='images/' + image) }}">
        </div>
        <div class="map-container">
            <div id="map"></div>
            <h3>This Round: {{ score_add }} points</h3>
            <h3>Total Score: {{ total_score }} points</h3>
            <h4>{{ description }}</h4>
            <a class="start" href="{{ url_for('campus_guesser') }}">Next Round</a>
        </div>
    </div>

    <script>

        var correctLat = {{ correct_lat|tojson }};
        var correctLng = {{ correct_lng|tojson }};
        var userLat = {{ user_lat|tojson }};
        var userLng = {{ user_lng|tojson }};
        
        var map = L.map('map').setView([correctLat, correctLng], 14);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        var greenIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var correctMarker = L.marker([correctLat, correctLng], { icon: greenIcon })
            .addTo(map)
            .bindPopup("Correct Location");

        var userMarker = L.marker([userLat, userLng], { icon: redIcon })
            .addTo(map)
            .bindPopup("Your Guess");


        L.polyline([
            [correctLat, correctLng],
            [userLat, userLng]
        ], {color: 'red'}).addTo(map);


        var bounds = L.latLngBounds([
            [correctLat, correctLng],
            [userLat, userLng]
        ]);
        map.fitBounds(bounds, { padding: [50, 50] });
        
    </script>
</body>
</html>
