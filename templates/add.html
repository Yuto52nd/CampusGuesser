<!DOCTYPE html>
<html>
<head>
    <title>Add Location</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CG.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('CGGAME') }}">Play</a>
        <a href="{{ url_for('overview') }}">Overview</a>
        <a href="{{ url_for('add_location') }}">Add Location</a>
        
</div>
<h1>Add Location</h1>

<form method="POST" enctype="multipart/form-data">
    
    <p>
        <label>Image:</label><br>
        <input type="file" id="imageInput" name="image" required>
    </p>

    <!-- Image preview -->
    <img id="preview" style="max-width:200px; display:none;"><br><br>

    <!-- Hidden inputs -->
    <input type="hidden" id="latInput" name="lat">
    <input type="hidden" id="lngInput" name="lng">

    <p>Click map to set location:</p>
    <div id="map" style="height:400px;"></div>

    <p>
        <label>Description:</label><br>
        <textarea name="description"></textarea>
    </p>

    <button type="submit">Add Location</button>
</form>

<script>
    //  Image preview
    document.getElementById("imageInput").onchange = function(e) {
        const preview = document.getElementById("preview");
        preview.src = URL.createObjectURL(e.target.files[0]);
        preview.style.display = "block";
    };
    var map = L.map('map').setView([51.29659, 1.061731], 14);

    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var marker;

    map.on('click', function(e) {
        if (marker) map.removeLayer(marker);

        marker = L.marker(e.latlng).addTo(map);

        document.getElementById("latInput").value = e.latlng.lat;
        document.getElementById("lngInput").value = e.latlng.lng;
    });
</script>

</body>
</html>
